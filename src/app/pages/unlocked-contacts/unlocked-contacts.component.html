<h2>Unlocked Contacts</h2>

<div *ngIf="loading">Loading...</div>

<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!loading && contacts.length === 0">
  No unlocked contacts yet.
</div>

<table *ngIf="contacts.length">
  <thead>
    <tr>
      <th>Property</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let c of contacts">
      <td>{{ c.propertyTitle }}</td>
      <td>₹{{ c.paymentAmount }}</td>
      <td>{{ c.paymentStatus }}</td>
      <td>{{ c.createdAt | date:'short' }}</td>
    </tr>
  </tbody>
</table>

<div class="page-wrap edit-property">
      <div class="auth-brand" routerLink="/">
    <img src="assets/images/Logo_White.png" alt="LandPortal Logo" class="logo"/>
  </div>
      <!-- HEADER -->
  <div class="property-form-card">
    <h2 class="title-strong">Edit Property</h2>
    <p class="form-subtitle">
      Update the details below. Your changes will be saved when you click save.
    </p>

    <!-- ERROR -->
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>



    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- BASIC DETAILS -->
      <div class="form-section">
        <h4 class="section-title">Basic Details</h4>

        <div class="form-group">
          <label>Title *</label>
          <input class="form-control" formControlName="title" />
        </div>

        <div class="form-group">
          <label>Description *</label>
          <textarea
            rows="3"
            class="form-control"
            formControlName="description">
          </textarea>
        </div>
      </div>

      <!-- PRICING -->
      <div class="form-section">
        <h4 class="section-title">Pricing & Size</h4>

        <div class="row">
          <div class="col-md-4 form-group">
            <label>Price (₹)</label>
            <input type="number" class="form-control" formControlName="price" />
          </div>

          <div class="col-md-4 form-group">
            <label>Land Size</label>
            <input type="number" class="form-control" formControlName="landSize" />
          </div>

          <div class="col-md-4 form-group">
            <label>Size Unit</label>
            <select class="form-select" formControlName="sizeUnit">
              <option [ngValue]="0">Sqft</option>
              <option [ngValue]="1">Cent</option>
              <option [ngValue]="2">Acre</option>
            </select>
          </div>
        </div>
      </div>

      <!-- LOCATION -->
      <div class="form-section">
        <h4 class="section-title">Location</h4>

        <div class="row">
          <div class="col-md-6 form-group">
            <label>City</label>
            <input class="form-control" formControlName="city" />
          </div>

          <div class="col-md-6 form-group">
            <label>Locality</label>
            <input class="form-control" formControlName="locality" />
          </div>
        </div>
      </div>

      <!-- PROPERTY DETAILS -->
      <div class="form-section">
        <h4 class="section-title">Property Details</h4>

        <div class="row">
          <div class="col-md-6 form-group">
            <label>Road Access</label>
            <select class="form-select" formControlName="roadAccess">
              <option value="">Select</option>
              <option *ngFor="let r of roadAccessOptions" [value]="r">
                {{ r }}
              </option>
            </select>
          </div>

          <div class="col-md-6 form-group">
            <label>Facing</label>
            <select class="form-select" formControlName="facing">
              <option value="">Select</option>
              <option *ngFor="let f of facingOptions" [value]="f">
                {{ f }}
              </option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label>Plot Type</label>
            <select class="form-select" formControlName="plotType">
              <option value="">Select</option>
              <option *ngFor="let p of plotTypeOptions" [value]="p">
                {{ p }}
              </option>
            </select>
          </div>

          <div class="col-md-6 form-group">
            <label>Brokerage</label>
            <select class="form-select" formControlName="brokerage">
              <option value="">Select</option>
              <option *ngFor="let b of brokerageOptions" [value]="b">
                {{ b }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- IMAGES -->
      <div class="form-section">
        <h4 class="section-title">Property Images</h4>

        <div class="image-upload-bar">
          <input
            type="file"
            class="d-none"
            #fileInput
            (change)="onFileSelected($event)" />

          <button
            type="button"
            class="btn btn-outline-secondary"
            (click)="fileInput.click()">
            + Add Image
          </button>

          <span class="hint-text">
            Drag to reorder. First image will be cover.
          </span>
        </div>

        <!-- IMAGE GRID -->
        <div
          class="image-grid"
          cdkDropList
          (cdkDropListDropped)="drop($event)">
          
          <div
            class="img-box"
            *ngFor="let img of previews; let i = index"
            cdkDrag>

            <img
              [src]="img"
              (error)="onImageError($event)" />

            <button
              type="button"
              class="remove-btn"
              [disabled]="existingMedia.length <= 1"
              (click)="removeExistingImage(i)">
              Remove
            </button>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>

        <button
          type="button"
          class="btn-secondary"
          (click)="goBack()">
          ❌ Cancel
        </button>
      </div>

    </form>

       <!-- SUCCESS -->
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <!-- SAVING OVERLAY -->
    <div class="saving-overlay" *ngIf="isSaving">
      <div class="saving-box">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3">Saving property...</p>
      </div>
    </div>

  </div>
</div>

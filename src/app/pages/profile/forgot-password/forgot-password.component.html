<div class="auth-page">

  <div class="auth-card">

    <!-- Title -->
    <h2 class="title-strong">Forgot Password</h2>
    <p class="subtitle">
      Enter your registered email address and we’ll send you a one-time password to reset your account.
    </p>

    <form [formGroup]="form">
      <label>Email address</label>
      <input
        type="email"
        placeholder="you@example.com"
        formControlName="email" />

      <!-- Send OTP -->
      <button
        type="button"
        class="btn-primary"
        (click)="sendOtp()"
        [disabled]="loading || resendCooldown > 0">
        {{ loading ? 'Sending OTP…' : 'Send OTP' }}
      </button>
    </form>

    <!-- Resend OTP -->
    <button
      class="resend-link"
      type="button"
      (click)="sendOtp()"
      [disabled]="resendCooldown > 0 || loading">
      {{ resendCooldown > 0
          ? 'Resend OTP in ' + resendCooldown + 's'
          : 'Resend OTP' }}
    </button>

    <!-- Messages -->
    <div class="success" *ngIf="message">{{ message }}</div>
    <div class="error" *ngIf="error">{{ error }}</div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Cancel -->
    <button
      type="button"
      class="btn-cancel"
      routerLink="/login">
      Cancel
    </button>

  </div>

</div>

<div class="page-wrap profile-page">
  <div class="property-form-card">

    <!-- HEADER -->
    <div class="form-header">
      <h2 class="title-strong">Edit Profile</h2>
      <p class="form-subtitle">
        Update your personal information below.
      </p>
    </div>

    <!-- PROFILE PHOTO -->
    <div class="profile-photo-section">
      <app-profile-photo></app-profile-photo>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="save()" novalidate>

      <div class="form-section">
        <h4 class="section-title">Personal Details</h4>

        <!-- FULL NAME -->
        <div class="form-group">
          <label>Full Name *</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="fullName"
            name="fullName"
            required
          />
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email *</label>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            required
            disabled
          />
          <small class="hint-text">
            Email cannot be changed.
          </small>
        </div>

        <!-- PHONE -->
        <div class="form-group">
          <label>Phone</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="phone"
            name="phone"
            placeholder="Enter phone number"
          />
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="loading">
          {{ loading ? 'Saving...' : 'Save Changes' }}
        </button>

        <button
          type="button"
          class="btn-secondary"
          routerLink="/profile">
          ❌ Cancel
        </button>
      </div>

      <!-- STATUS MESSAGE -->
      <p *ngIf="message" class="status-message">
        {{ message }}
      </p>

    </form>
  </div>
</div>

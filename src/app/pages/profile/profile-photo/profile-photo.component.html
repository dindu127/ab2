<div class="profile-photo-card">

  <!-- 💀 Skeleton -->
  <div *ngIf="loading" class="avatar-skeleton"></div>

  <!-- Avatar -->
  <div *ngIf="!loading" class="avatar-wrapper">
    <img
      [src]="currentPhoto || 'assets/images/avatar-placeholder.png'"
      class="profile-avatar"
    />
  </div>

  <!-- File input -->
  <input type="file" accept="image/*" (change)="onFileSelected($event)" />

  <!-- Cropper -->
  <image-cropper
    *ngIf="imageChangedEvent"
    [imageChangedEvent]="imageChangedEvent"
    [maintainAspectRatio]="true"
    [aspectRatio]="1 / 1"
    [resizeToWidth]="300"
    format="png"
    (imageCropped)="imageCropped($event)">
  </image-cropper>

  <!-- Actions -->
  <button class="upload-btn"
          (click)="upload()"
          [disabled]="uploading || !croppedImage">
    {{ uploading ? 'Uploading...' : 'Save Photo' }}
  </button>

  <button *ngIf="currentPhoto"
          class="delete-btn"
          (click)="deletePhoto()"
          [disabled]="deleting">
    {{ deleting ? 'Removing...' : 'Delete Photo' }}
  </button>
    <div *ngIf="successMessage" class="success">
      {{ successMessage }}
    </div>

    <!-- ERROR MESSAGE -->
    <div *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </div>
</div>

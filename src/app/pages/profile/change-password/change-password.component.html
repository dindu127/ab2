<div class="page-wrap profile-page">
  <div class="property-form-card">

    <!-- HEADER -->
    <div class="form-header">
      <h2 class="title-strong">Change Password</h2>
      <p class="form-subtitle">
        Choose a strong password to keep your account secure.
      </p>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="save()" novalidate>

      <div class="form-section">
        <h4 class="section-title">Security</h4>

        <!-- CURRENT PASSWORD -->
        <div class="form-group">
          <label>Current Password *</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="currentPassword"
            name="currentPassword"
            placeholder="Enter current password"
            required
          />
        </div>

        <!-- NEW PASSWORD -->
        <div class="form-group">
          <label>New Password *</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Enter new password"
            required
          />
          <small class="hint-text">
            Use at least 8 characters with letters & numbers.
          </small>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="form-group">
          <label>Confirm New Password *</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            required
          />
        </div>
      </div>

            <!-- STATUS MESSAGES -->
      <p *ngIf="successMessage" class="status-message success">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="status-message error">
        {{ errorMessage }}
      </p>

      <!-- ACTIONS -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn-primary"
          [disabled]="loading">
          {{ loading ? 'Changing...' : 'Change Password' }}
        </button>

        <button
          type="button"
          class="btn-secondary"
          (click)="close()">
          ❌ Cancel
        </button>
      </div>

    </form>
  </div>
</div>

<div class="auth-page">

  <div class="auth-card">

    <h2 class="title-strong">Reset Password</h2>
    <p class="subtitle">
      Enter the OTP sent to your email and choose a new password.
    </p>

    <form [formGroup]="form">

      <!-- OTP -->
      <label>One-Time Password</label>
      <input
        type="text"
        placeholder="6-digit OTP"
        formControlName="otp"
        maxlength="6"
      />

      <!-- New Password -->
      <label>New Password</label>
      <input
        type="password"
        placeholder="Enter new password"
        formControlName="newPassword"
      />

      <!-- Reset Button -->
      <button
        type="button"
        class="btn-primary"
        (click)="resetPassword()"
        [disabled]="loading || attemptsLeft <= 0">
        {{ loading ? 'Resetting password…' : 'Reset Password' }}
      </button>

    </form>

    <!-- Attempts exhausted -->
    <div class="error" *ngIf="attemptsLeft <= 0">
      OTP attempts exceeded. Please resend OTP.
    </div>

    <!-- Success & Error -->
    <div class="success" *ngIf="message">{{ message }}</div>
    <div class="error" *ngIf="error">{{ error }}</div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Cancel -->
    <button
      type="button"
      class="btn-cancel"
      routerLink="/login">
      Cancel
    </button>

  </div>

</div>
